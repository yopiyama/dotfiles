set-option -g default-shell /opt/homebrew/bin/zsh

# ステータスバーを bottom に配置する
set-option -g status-position bottom

# 左右のステータスバーの長さを決定する
set-option -g status-left-length 90
set-option -g status-right-length 200

# 最左に表示
# set-option -g status-left "#[bg=default,fg=default] Session:#S "
set-option -g status-left " Session:#S "
# 最右に表示
# set-option -g status-right "| #(sh ~/.tmux/ip_addr.sh) | #[fg=colour014] %m/%d %H:%M:%S#[default]"
set-option -g status-right "| #(zsh ~/.tmux/ip_addr.sh) | %m/%d %H:%M:%S"

# ステータスバーを1秒毎に描画し直す
set-option -g status-interval 1

# Window 名をカレントディレクトリへ自動変更
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'

# センタライズ（主にウィンドウ番号など）
set-option -g status-justify centre

## ヴィジュアルノーティフィケーションを有効にする
setw -g monitor-activity on
set -g visual-activity on


# 256色端末を使用する
set -g default-terminal "screen-256color"
set -g terminal-overrides "xterm:colors=256"

# クリップボード連携（iTerm2 などが OSC52 をサポートしている場合に有効）
set -g set-clipboard on

# ステータスバーの色を設定する
# set -g status-fg black
# set -g status-bg colour81
set -g status-fg white
set -g status-bg black



# マウス使う
set-option -g mouse on

# History Limit を増やす. default = 2000
set -g history-limit 20000

# ----- bind keys -----
# C-bのキーバインドを解除する
unbind C-b
# prefixキーを変更する
set -g prefix C-p


# Viのキーバインド
setw -g mode-keys vi

# キーストロークのディレイを減らす
set -sg escape-time 100

# 設定ファイルをリロードする
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# セッション作成（デタッチ状態で作成。アタッチしない）
bind C-c command-prompt -p "New session name:" "new-session -d -s '%%'"

# セッションリネーム（現在のセッション名を初期値として表示）
bind C-r command-prompt -I "#S" -p "Rename session:" "rename-session '%%'"

# アタッチ中セッション内の Window のみ表示
unbind-key -T prefix w
bind-key   -T prefix w set-option -gF "@_cur_sess" "#S" \; choose-tree -Zwf "#{==:#{session_name},#{@_cur_sess}}"

# セッション選択を名前順でソート表示
bind s choose-tree -Zs0 name

# | でペインを縦に分割する
bind \\ split-window -h -c "#{pane_current_path}"

# - でペインを横に分割する
bind - split-window -v -c "#{pane_current_path}"

set display-panes-time 10000

# Vimのキーバインドでペインを移動する
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-h select-pane -L
bind -n M-l select-pane -R

bind -r h select-window -t :-
bind -r l select-window -t :+

# 新規のWindowやPainをカレントディレクトリで開く
bind c new-window -c '#{pane_current_path}'
bind '"' split-window -c '#{pane_current_path}'
bind % split-window -h -c '#{pane_current_path}'

# コピー系
# vim <=> tmux 間でクリップボード利用を可能にする
# v tmuxでのselectionモード開始
# y copyしてselectionモードを終了
# Enter yと同じ動作
## For Mac
if-shell "uname | grep -q Darwin" \
    'bind-key -T copy-mode-vi v send-keys -X begin-selection \; display-message "Copy mode!"'
if-shell "uname | grep -q Darwin" \
    'bind-key -T copy-mode-vi Space send-keys -X begin-selection'
if-shell "uname | grep -q Darwin" \
    'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "tr -d '\''\\000'\'' | iconv -c -f UTF-8 -t UTF-8 | /usr/bin/pbcopy"'
if-shell "uname | grep -q Darwin" \
    'bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "tr -d '\''\\000'\'' | iconv -c -f UTF-8 -t UTF-8 | /usr/bin/pbcopy"'

## For Linux
if-shell 'type xsel' \
	"bind-key -T copy-mode-vi Space send-keys -X begin-selection"
if-shell 'type xsel' \
	"bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xsel -ib'"
if-shell 'type xsel' \
	"bind-key -T copy-mode-vi Y send-keys -X copy-pipe 'xsel -ib'"
if-shell 'type xsel' \
	"bind ] run-shell \
		'xsel -ob | xargs -0 -I{} tmux set-buffer -- {} && tmux paste-buffer'"
