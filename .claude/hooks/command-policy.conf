# Command prefix policy for Claude Code
# allow-safe-pipes.sh が参照する。将来的に settings.json の生成元としても利用可能。
# 各行はコマンドプレフィックス。# はコメント、空行は無視。

[allow]
awk
cat
cut
date
eza
file
find
gh issue view
gh pr check
gh pr comment
gh pr create
gh pr diff
gh pr edit
gh pr list
gh pr view
gh release view
gh repo view
gh run list
gh run view
gh workflow list
gh workflow view
git add
git blame
git branch
git commit
git describe
git diff
git fetch
git grep
git init
git log
git ls-files
git remote
git restore --staged
git rev-parse
git shortlog
git show
git stash apply
git stash list
git stash pop
git stash push
git stash show
git status
git tag
git worktree
grep
head
jq
ls
obsidian append
obsidian create
obsidian daily
obsidian file
obsidian files
obsidian open
obsidian prepend
obsidian property
obsidian read
obsidian search
obsidian task
obsidian tasks
obsidian template
obsidian vault
obsidian version
pwd
rg
sed -n
sort
stat
tail
tr
type
uname
uniq
wc
which
whoami
codex
~/.claude/skills/code-review/scripts/codex-review.sh

[deny]
curl
wget
sudo
rm -rf
xargs
tee
perl -pi
sed -i
sh
bash
zsh
eval
git checkout
git clean
git config
git filter-branch
git push
git reset
git revert
git switch
git update-ref
gh pr merge
gh pr close

[deny_pattern]
# find の危険フラグ（settings.json の find * -delete* 等に対応）
find .*-delete
find .*-exec
find .*-execdir
find .*-ok
find .*-iwholename.*/
# 機密ファイルの読み取り（settings.json の cat *.env* に対応）
cat .*\.env
